<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Spin 綜合模擬器</title>
    <style>
        :root {
            --bg-color: #0f0f1b;
            --panel-bg: #1a1a2e;
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ea;
            --neon-green: #39ff14;
            --text-main: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        
        /* 頂部導覽區 */
        .top-nav {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin: 0; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn {
            background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
            transition: all 0.3s ease;
        }
        .nav-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 10px var(--neon-blue); }

        .layout-container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 20px; }
        .top-row { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; gap: 40px; }
        
        /* 輪盤區 */
        .left-col { flex: 0 0 auto; }
        .wheel-container {
            position: relative; width: 400px; height: 400px; border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
        }
        #wheelCanvas {
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 5s cubic-bezier(0.25, 0.1, 0.15, 1);
        }
        .pointer {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid var(--neon-pink);
            filter: drop-shadow(0 0 10px var(--neon-pink)); z-index: 10;
        }

        /* 控制區 */
        .right-col {
            flex: 1; min-width: 300px; background: var(--panel-bg); border-radius: 12px; padding: 25px;
            box-shadow: 0 0 20px rgba(255, 0, 234, 0.2); display: flex; flex-direction: column; gap: 20px;
        }
        .bet-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .bet-btn {
            padding: 15px 10px; background: #2a2a4a; border: 2px solid #3a3a6a; color: white; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .bet-btn.wide { grid-column: span 2; }
        .bet-btn .chip { display: none; background: var(--neon-green); color: black; border-radius: 50%; padding: 2px 8px; font-size: 12px; }
        .bet-btn.active { border-color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); background: #3a2a4a; }
        .bet-btn.active .chip { display: block; }
        
        .action-btn {
            padding: 15px; font-size: 18px; font-weight: bold; color: #000; background: var(--neon-green); border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px var(--neon-green); transition: transform 0.1s;
        }
        .action-btn.simulate { background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .action-btn:active { transform: scale(0.98); }
        .action-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; }

        /* 日誌與統計 */
        .bottom-row { display: flex; flex-direction: column; gap: 20px; }
        .panel { background: var(--panel-bg); border-radius: 12px; padding: 20px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); }
        .panel h3 { margin-top: 0; color: var(--neon-blue); }
        .log-area { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #333; height: 150px; overflow-y: auto; font-family: monospace; font-size: 14px; }
        .highlight-win { color: var(--neon-green); font-weight: bold;}
        .highlight-bonus { color: var(--neon-pink); font-weight: bold;}

        .stats-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .stats-table th, .stats-table td { border: 1px solid #333; padding: 10px; text-align: center; }
        .stats-table th { background: #2a2a4a; color: var(--neon-blue); }

        /* 通用視窗 (規則 & 神秘盒) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
        .modal-title { color: var(--neon-blue); font-size: 32px; margin-bottom: 30px; text-shadow: 0 0 15px var(--neon-blue); }
        .boxes-container { display: flex; gap: 30px; }
        .mystery-box { width: 120px; height: 120px; background: linear-gradient(135deg, #4b0082, #8a2be2); border: 3px solid var(--neon-pink); border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--neon-pink); transition: transform 0.3s; }
        .mystery-box:hover { transform: scale(1.1); }
        .mystery-box.opened { background: #222; border-color: #555; cursor: default; transform: scale(1); box-shadow: none; }
        .mystery-box.winner { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 30px var(--neon-green); }
        .close-btn { margin-top: 30px; padding: 10px 30px; background: var(--neon-blue); color: black; font-size: 18px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        /* 規則視窗內部樣式 */
        .rules-content {
            background: var(--panel-bg); border: 1px solid var(--neon-blue); padding: 30px;
            border-radius: 10px; width: 80%; max-width: 800px; max-height: 80vh; overflow-y: auto;
            color: var(--text-main); line-height: 1.6; font-size: 15px; box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }
        .rules-content h2 { color: var(--neon-pink); text-align: center; margin-top: 0; }
        .rules-content h4 { color: var(--neon-green); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .rules-content ul { padding-left: 20px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <h1>Neon Spin</h1>
        <div class="nav-buttons">
            <select id="modelSelect" class="nav-btn" onchange="changeModel()" style="background:var(--panel-bg);">
                <option value="v1">Model v1 (8 Mystery Boxes)</option>
                <option value="v2">Model v2 (4 Mystery Boxes)</option>
            </select>
            <button class="nav-btn" onclick="toggleLanguage()" id="langBtn">EN / 中文</button>
            <button class="nav-btn" onclick="openRulesModal()" id="rulesBtn">📖 遊戲說明</button>
        </div>
    </div>

    <div class="layout-container">
        <div class="top-row">
            <div class="left-col">
                <div class="wheel-container">
                    <div class="pointer"></div>
                    <canvas id="wheelCanvas" width="500" height="500"></canvas>
                </div>
            </div>

            <div class="right-col">
                <h3 style="margin-top: 0; text-align: center; color: var(--neon-pink);" id="t_chooseBets">選擇下注目標</h3>
                <div class="bet-section" id="bet-options">
                    <button class="bet-btn active" data-bet="0"><span>1x</span><span class="chip t_chip">已下注</span></button>
                    <button class="bet-btn active" data-bet="1"><span>2x</span><span class="chip t_chip">已下注</span></button>
                    <button class="bet-btn active" data-bet="2"><span>5x</span><span class="chip t_chip">已下注</span></button>
                    <button class="bet-btn active" data-bet="3"><span>10x</span><span class="chip t_chip">已下注</span></button>
                    <button class="bet-btn wide active" data-bet="4"><span>Mystery Box</span><span class="chip t_chip">已下注</span></button>
                </div>
                <button class="action-btn" id="spinBtn" onclick="startVisualSpin()">🎰 單局實境轉盤 (SPIN)</button>
                <button class="action-btn simulate" id="simBtn" onclick="runBulkSimulation(10000)">🚀 快速模擬 10,000 局</button>
            </div>
        </div>

        <div class="bottom-row">
            <div class="panel">
                <h3 id="t_logTitle">最新動態</h3>
                <div class="log-area" id="log-output"></div>
            </div>

            <div class="panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin: 0;" id="t_statsTitle">RTP 統計數據 (累計)</h3>
                    <button onclick="resetStats()" id="t_resetBtn" style="padding: 5px 15px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 5px;">重置統計</button>
                </div>
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th id="th_option">下注選項</th>
                            <th id="th_bets">總下注數</th>
                            <th id="th_wins">總贏分 (含本金)</th>
                            <th id="th_srtp">實測 RTP</th>
                            <th id="th_trtp">理論 RTP</th>
                        </tr>
                    </thead>
                    <tbody id="stats-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="mysteryModal">
        <div class="modal-title" id="t_boxTitle">🌟 觸發神秘盒！請選擇一個寶箱 🌟</div>
        <div class="boxes-container" id="boxesContainer"></div>
        <button class="close-btn" id="modalCloseBtn" onclick="closeMysteryModal()" style="display: none;">結算並關閉</button>
    </div>

    <div class="modal-overlay" id="rulesModal">
        <div class="rules-content" id="rulesContentBox">
            </div>
        <button class="close-btn" onclick="closeRulesModal()" id="t_rulesClose">關閉說明</button>
    </div>

    <script>
        // --- 0. 語系與字典 (i18n) ---
        let currentLang = 'en'; // 預設英文
        
        const i18n = {
            zh: {
                btnRules: "📖 遊戲說明", chooseBets: "選擇下注目標", chip: "已下注", spin: "🎰 單局實境轉盤 (SPIN)", sim: "🚀 快速模擬 10,000 局",
                logTitle: "最新動態", statsTitle: "RTP 統計數據 (累計)", resetBtn: "重置統計", boxTitle: "🌟 觸發神秘盒！請選擇一個寶箱 🌟", closeBox: "結算並關閉", closeRules: "關閉說明",
                th_op: "下注選項", th_be: "總下注數", th_wi: "總贏分 (含本金)", th_srtp: "實測 RTP", th_trtp: "理論 RTP",
                alertSelect: "請至少選擇一個下注！",
                msgBonusFlash: "[系統] ⚡ {0} 獲得 Bonus，倍率升至 {1}x！",
                msgWheelStop: "[輪盤] 停在 🎯 {0}{1}",
                msgBonusSuffix: " (Bonus!)",
                msgWin: "💰 恭喜押中，獲得賠付: {0} 單位！",
                msgLose: "❌ 沒押中。",
                msgBoxTrigger: "🎁 觸發神秘盒！等待選擇...",
                msgBoxResult: "💰 神秘盒開獎！你選擇了 {0}x 的獎勵！",
                msgSimStart: "🚀 啟動純數學模擬 {0} 局...請稍候",
                msgSimDone: "✅ 模擬完成！統計資料已更新。",
                msgReset: "統計資料與日誌已重置。",
                rules: `
                    <h2>《Neon Spin》遊玩規則</h2>
                    <h4>1. 遊戲簡介</h4>
                    <p>《Neon Spin》是一款簡單、快節奏的輪盤遊戲。輪盤總共分為 54 個區塊，包含 4 種數字區塊以及專屬的「神祕盒 (Mystery Box)」區塊。</p>
                    <h4>2. 如何下注</h4>
                    <p>玩家可以自由將籌碼押注在 5 個選項上：數字 1、數字 2、數字 5、數字 10，或是 神祕盒 (Mystery Box)。下注時間結束後，主持人將會轉動輪盤。</p>
                    <h4>3. 隨機幸運倍率 (Lucky Multipliers)</h4>
                    <p>在輪盤轉動前，系統會為每局遊戲隨機抽出額外的幸運倍率，並分配到 1 或 2 個常規區塊上。<br>
                    若輪盤最終停在帶有幸運倍率的區塊上，該倍率將會<b>直接取代</b>原先的基礎賠付！</p>
                    <ul>
                        <li><b>【倍率升級保證】</b>：附加的幸運倍率絕對會「高於」該選項原本的基礎賠率！例如押中 10 倍區塊，幸運倍率保證從 15 倍起跳，確保您贏得更豐厚的獎金！</li>
                        <li><b>注意</b>：幸運倍率僅會附加在常規數字上，不會出現在神祕盒區塊上。</li>
                    </ul>
                    <h4>4. 神祕盒獎勵 (Mystery Box Bonus)</h4>
                    <p>當輪盤停在「神祕盒」區塊時，本局有在該選項下注的玩家即可進入神祕盒環節。畫面上將會出現 3 個寶箱。玩家必須在 <b>5 秒內</b>點擊選擇其中 1 個寶箱。若玩家在時間內未做出選擇，系統將會代為隨機挑選 1 個寶箱。<br>
                    每個寶箱內皆藏有不同的高低倍率，打開寶箱後，玩家將根據自己抽中的專屬倍率獲得對應獎金。</p>
                    <h4>5. 基礎賠付表 (Standard Payouts)</h4>
                    <ul>
                        <li>押中 1：賠付 1:1</li>
                        <li>押中 2：賠付 2:1</li>
                        <li>押中 5：賠付 5:1</li>
                        <li>押中 10：賠付 10:1</li>
                        <li>押中 神祕盒：依抽中寶箱內顯示的倍率進行賠付。</li>
                    </ul>
                `
            },
            en: {
                btnRules: "📖 Game Rules", chooseBets: "Choose Your Bets", chip: "Betted", spin: "🎰 Single Spin (Visual)", sim: "🚀 Quick Simulate 10k Rounds",
                logTitle: "Latest Events", statsTitle: "RTP Statistics (Cumulative)", resetBtn: "Reset Stats", boxTitle: "🌟 Mystery Box Triggered! Pick a chest 🌟", closeBox: "Claim & Close", closeRules: "Close Rules",
                th_op: "Bet Option", th_be: "Total Bets", th_wi: "Total Wins", th_srtp: "Simulated RTP", th_trtp: "Theoretical RTP",
                alertSelect: "Please select at least one bet option!",
                msgBonusFlash: "[System] ⚡ {0} got Bonus! Upgraded to {1}x!",
                msgWheelStop: "[Wheel] Stopped on 🎯 {0}{1}",
                msgBonusSuffix: " (Bonus!)",
                msgWin: "💰 Congratulations! You won {0} units!",
                msgLose: "❌ Better luck next time.",
                msgBoxTrigger: "🎁 Mystery Box Triggered! Waiting for pick...",
                msgBoxResult: "💰 Mystery Box Revealed! You chose the {0}x reward!",
                msgSimStart: "🚀 Starting pure math simulation for {0} rounds... please wait.",
                msgSimDone: "✅ Simulation complete! Stats updated.",
                msgReset: "Statistics and logs have been reset.",
                rules: `
                    <h2>Neon Spin Game Rules</h2>
                    <h4>1. Game Overview</h4>
                    <p>Neon Spin is a simple, fast-paced lucky wheel game show. The wheel consists of 54 segments, featuring 4 different numbers and a special "Mystery Box" segment.</p>
                    <h4>2. How to Play</h4>
                    <p>Players can place their bets on 5 available options: Number 1, Number 2, Number 5, Number 10, or the Mystery Box. Once betting time is over, the presenter will spin the lucky wheel.</p>
                    <h4>3. Lucky Multipliers</h4>
                    <p>Before the wheel is spun, extra random multipliers are drawn and distributed to 1 or 2 regular segments each game round.<br>
                    If the wheel stops on a segment with a multiplier, this enhanced multiplier will <b>replace</b> the standard payout value for the selected number.</p>
                    <ul>
                        <li><b>[Upgrade Guarantee]</b>: The applied lucky multiplier will ALWAYS be strictly higher than the base payout of that segment! For instance, if a multiplier lands on Number 10, it is guaranteed to be 15x or higher, ensuring a much bigger win!</li>
                        <li><b>Note</b>: Random multipliers do not apply to the Mystery Box segment.</li>
                    </ul>
                    <h4>4. Mystery Box Bonus</h4>
                    <p>Triggered when the wheel stops on the Mystery Box segment. Every player with a valid bet on the Mystery Box in the current game round is eligible to take part.<br>
                    3 chests will appear on the screen. Players have <b>5 seconds</b> to pick 1 chest of their choice. If a player misses the selection time, the system will select one box randomly on their behalf.<br>
                    Each chest contains a hidden multiplier. Players will be rewarded according to the multiplier inside their chosen box.</p>
                    <h4>5. Standard Payouts</h4>
                    <ul>
                        <li>Number 1: Pays 1:1</li>
                        <li>Number 2: Pays 2:1</li>
                        <li>Number 5: Pays 5:1</li>
                        <li>Number 10: Pays 10:1</li>
                        <li>Mystery Box: Pays according to the revealed multiplier.</li>
                    </ul>
                `
            }
        };

        function getText(key) { return i18n[currentLang][key]; }
        function formatText(key, ...args) {
            let str = getText(key);
            args.forEach((val, i) => { str = str.replace(`{${i}}`, val); });
            return str;
        }

        function applyLanguage() {
            // 更新介面文字
            document.getElementById('langBtn').innerText = currentLang === 'zh' ? 'EN / 中文' : '中文 / EN';
            document.getElementById('rulesBtn').innerText = getText('btnRules');
            document.getElementById('t_chooseBets').innerText = getText('chooseBets');
            document.querySelectorAll('.t_chip').forEach(el => el.innerText = getText('chip'));
            document.getElementById('spinBtn').innerText = getText('spin');
            document.getElementById('simBtn').innerText = getText('sim');
            document.getElementById('t_logTitle').innerText = getText('logTitle');
            document.getElementById('t_statsTitle').innerText = getText('statsTitle');
            document.getElementById('t_resetBtn').innerText = getText('resetBtn');
            document.getElementById('t_boxTitle').innerText = getText('boxTitle');
            document.getElementById('modalCloseBtn').innerText = getText('closeBox');
            document.getElementById('t_rulesClose').innerText = getText('closeRules');
            
            document.getElementById('th_option').innerText = getText('th_op');
            document.getElementById('th_bets').innerText = getText('th_be');
            document.getElementById('th_wins').innerText = getText('th_wi');
            document.getElementById('th_srtp').innerText = getText('th_srtp');
            document.getElementById('th_trtp').innerText = getText('th_trtp');
            
            document.getElementById('rulesContentBox').innerHTML = getText('rules');
            updateStatsTable(); // 更新表格以應用翻譯
        }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            applyLanguage();
        }

        // 規則視窗控制
        function openRulesModal() {
            document.getElementById('rulesContentBox').innerHTML = getText('rules');
            document.getElementById('rulesModal').style.display = 'flex';
        }
        function closeRulesModal() { document.getElementById('rulesModal').style.display = 'none'; }

        // --- 1. 資料與模型 ---
        const typeNames = { 0: "1x", 1: "2x", 2: "5x", 3: "10x", 4: "Mystery Box" };
        const colors = { 0: "#FFEB3B", 1: "#2196F3", 2: "#E91E63", 3: "#9C27B0", 4: "#00E5FF" };
        const baseReturns = { 0: 2, 1: 3, 2: 6, 3: 11 };
        
        const models = {
            v1: {
                theoreticalRTP: { 0: 96.48, 1: 96.50, 2: 96.50, 3: 96.51, 4: 96.44 },
                segments: [21, 14, 7, 4, 8],
                pools: {
                    0: { vals: [5, 10, 15, 20, 25, 50], probs: [0.20, 0.21, 0.23, 0.06, 0.28, 0.02] },
                    1: { vals: [5, 10, 15, 20, 25, 50, 100], probs: [0.05, 0.07, 0.22, 0.17, 0.36, 0.11, 0.02] },
                    2: { vals: [10, 15, 25, 50, 100, 250], probs: [0.08, 0.45, 0.23, 0.03, 0.12, 0.09] },
                    3: { vals: [15, 25, 50, 100, 250, 500], probs: [0.08, 0.58, 0.06, 0.21, 0.01, 0.06] }
                },
                boxA: { vals: [3], probs: [1.0] },
                boxB: { vals: [4, 6], probs: [0.76, 0.24] },
                boxC: { vals: [11, 16, 26, 51], probs: [0.88, 0.10, 0.01, 0.01] },
                getBonusCount: () => Math.random() < 0.5 ? 1 : 2
            },
            v2: {
                theoreticalRTP: { 0: 96.76, 1: 97.48, 2: 90.97, 3: 93.64, 4: 96.55 },
                segments: [24, 15, 7, 4, 4],
                pools: {
                    0: { vals: [5, 10, 15, 20, 25, 50], probs: [0.70, 0.12, 0.07, 0.06, 0.03, 0.02] },
                    1: { vals: [5, 10, 15, 20, 25, 50, 100], probs: [0.05, 0.07, 0.22, 0.17, 0.36, 0.11, 0.02] },
                    2: { vals: [10, 15, 25, 50, 100, 250], probs: [0.10, 0.30, 0.23, 0.19, 0.11, 0.07] },
                    3: { vals: [15, 25, 50, 100, 250, 500], probs: [0.09, 0.40, 0.18, 0.21, 0.08, 0.04] }
                },
                boxA: { vals: [3, 4, 6, 11], probs: [0.70, 0.20, 0.07, 0.03] },
                boxB: { vals: [4, 6, 8, 11, 16, 21, 26, 31], probs: [0.44, 0.17, 0.15, 0.10, 0.06, 0.04, 0.03, 0.01] },
                boxC: { vals: [11, 16, 26, 51, 101, 126, 151, 176, 201, 251], probs: [0.50, 0.24, 0.106, 0.0544, 0.047, 0.021, 0.015, 0.0155, 0.001, 0.0001] },
                getBonusCount: () => Math.random() < 0.85 ? 1 : 2
            }
        };

        let currentModel = models.v1;
        let theoreticalRTP = currentModel.theoreticalRTP;
        let pools = currentModel.pools;
        let boxA = currentModel.boxA;
        let boxB = currentModel.boxB;
        let boxC = currentModel.boxC;

        function changeModel() {
            let ver = document.getElementById('modelSelect').value;
            currentModel = models[ver];
            theoreticalRTP = currentModel.theoreticalRTP;
            pools = currentModel.pools;
            boxA = currentModel.boxA;
            boxB = currentModel.boxB;
            boxC = currentModel.boxC;
            
            rawWheel = [...Array(currentModel.segments[0]).fill(0), ...Array(currentModel.segments[1]).fill(1), ...Array(currentModel.segments[2]).fill(2), ...Array(currentModel.segments[3]).fill(3), ...Array(currentModel.segments[4]).fill(4)];
            wheelSegments = generateDistributedWheel(rawWheel).map(type => ({ type: type, bonus: null, isFlashing: false }));
            regularIndices = wheelSegments.map((s, i) => s.type !== 4 ? i : -1).filter(i => i !== -1);
            
            resetStats();
            drawWheel();
        }

        let stats = { bets: {0:0, 1:0, 2:0, 3:0, 4:0}, wins: {0:0, 1:0, 2:0, 3:0, 4:0} };

        function weightedChoice(vals, probs) {
            let r = Math.random(), sum = 0;
            for (let i = 0; i < probs.length; i++) { sum += probs[i]; if (r <= sum) return vals[i]; }
            return vals[vals.length - 1];
        }

        function generateDistributedWheel(rawArray) {
            let counts = {};
            rawArray.forEach(x => { counts[x] = (counts[x] || 0) + 1; });
            let sortedTypes = Object.keys(counts).map(Number).sort((a, b) => counts[b] - counts[a]);
            let wheel = new Array(rawArray.length).fill(null);
            sortedTypes.forEach(type => {
                let count = counts[type];
                let step = wheel.length / count;
                let offset = Math.floor(Math.random() * wheel.length);
                for (let i = 0; i < count; i++) {
                    let pos = Math.floor(offset + i * step) % wheel.length;
                    while (wheel[pos] !== null) pos = (pos + 1) % wheel.length;
                    wheel[pos] = type;
                }
            });
            return wheel;
        }

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // --- 2. 轉盤與陣列初始化 ---
        let rawWheel = [...Array(currentModel.segments[0]).fill(0), ...Array(currentModel.segments[1]).fill(1), ...Array(currentModel.segments[2]).fill(2), ...Array(currentModel.segments[3]).fill(3), ...Array(currentModel.segments[4]).fill(4)];
        let wheelSegments = generateDistributedWheel(rawWheel).map(type => ({ type: type, bonus: null, isFlashing: false }));
        let regularIndices = wheelSegments.map((s, i) => s.type !== 4 ? i : -1).filter(i => i !== -1);

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = centerX - 10;
        const sliceAngle = (2 * Math.PI) / 54;
        let currentRotation = 0;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 54; i++) { if (!wheelSegments[i].isFlashing) drawSegment(i); }
            for (let i = 0; i < 54; i++) { if (wheelSegments[i].isFlashing) drawSegment(i); }
        }

        function drawSegment(i) {
            let segment = wheelSegments[i];
            let startAngle = i * sliceAngle - Math.PI / 2; 
            let endAngle = startAngle + sliceAngle;

            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.closePath();

            if (segment.isFlashing) {
                ctx.fillStyle = "#FF00EA"; ctx.shadowColor = "#FF00EA"; ctx.shadowBlur = 25; ctx.lineWidth = 4; ctx.strokeStyle = "#FFFFFF";
            } else {
                ctx.fillStyle = colors[segment.type]; ctx.shadowBlur = 0; ctx.lineWidth = 1; ctx.strokeStyle = "#111";
            }
            ctx.fill(); ctx.stroke();

            ctx.save();
            ctx.translate(centerX, centerY); ctx.rotate(startAngle + sliceAngle / 2); ctx.textAlign = "right";
            
            if (segment.isFlashing) {
                ctx.fillStyle = "#FFF"; ctx.font = "bold 22px Arial"; ctx.shadowColor = "#000"; ctx.shadowBlur = 8;
            } else {
                ctx.fillStyle = (segment.type === 0) ? "#000" : "#FFF"; ctx.font = "bold 14px Arial"; ctx.shadowBlur = 0;
            }
            
            let text = segment.type === 4 ? "BOX" : typeNames[segment.type];
            if (segment.isFlashing && segment.bonus) text = segment.bonus + "x"; 
            
            ctx.fillText(text, radius - 20, 6); ctx.restore();
        }
        drawWheel(); 

        // --- 3. UI 與工具 ---
        document.querySelectorAll('.bet-btn').forEach(btn => btn.addEventListener('click', () => btn.classList.toggle('active')));
        function getActiveBets() { return Array.from(document.querySelectorAll('.bet-btn.active')).map(b => parseInt(b.getAttribute('data-bet'))); }
        
        function logMessage(msg, type = '') {
            const logArea = document.getElementById('log-output');
            logArea.innerHTML += `<div style="margin-bottom: 5px;" class="${type}">${msg}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        function updateStatsTable() {
            const tbody = document.getElementById('stats-body'); tbody.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                let rtp = stats.bets[i] > 0 ? ((stats.wins[i] / stats.bets[i]) * 100).toFixed(4) : "0.0000";
                tbody.innerHTML += `
                    <tr><td>${typeNames[i]}</td><td>${stats.bets[i].toLocaleString()}</td><td>${stats.wins[i].toLocaleString()}</td><td style="color: ${rtp > 90 ? 'var(--neon-green)' : 'inherit'}">${rtp}%</td><td>${theoreticalRTP[i]}%</td></tr>
                `;
            }
        }

        function resetStats() { 
            stats = { bets: {0:0, 1:0, 2:0, 3:0, 4:0}, wins: {0:0, 1:0, 2:0, 3:0, 4:0} }; 
            document.getElementById('log-output').innerHTML = ''; 
            logMessage(getText('msgReset')); 
            updateStatsTable(); 
        }
        function setButtonsDisabled(disabled) { document.getElementById("spinBtn").disabled = disabled; document.getElementById("simBtn").disabled = disabled; }

        // --- 4. 視覺轉盤邏輯 ---
        let activeRoundData = {};

        function startVisualSpin() {
            let activeBets = getActiveBets();
            if (activeBets.length === 0) { alert(getText('alertSelect')); return; }
            setButtonsDisabled(true);
            document.getElementById('log-output').innerHTML = ''; 

            wheelSegments.forEach(s => { s.bonus = null; s.isFlashing = false; });
            drawWheel();

            let numBonuses = currentModel.getBonusCount();
            let targetIndices = shuffle(regularIndices).slice(0, numBonuses);
            
            targetIndices.forEach(idx => {
                let type = wheelSegments[idx].type;
                let mult = weightedChoice(pools[type].vals, pools[type].probs);
                wheelSegments[idx].bonus = mult;
                logMessage(formatText('msgBonusFlash', typeNames[type], mult), 'highlight-bonus');
            });

            let blinkCount = 0;
            let blinkInterval = setInterval(() => {
                targetIndices.forEach(idx => wheelSegments[idx].isFlashing = !wheelSegments[idx].isFlashing);
                drawWheel(); blinkCount++;
                if (blinkCount >= 6) {
                    clearInterval(blinkInterval);
                    targetIndices.forEach(idx => wheelSegments[idx].isFlashing = true); 
                    drawWheel(); executeRotation(activeBets); 
                }
            }, 300); 
        }

function executeRotation(activeBets) {
            let resultIdx = Math.floor(Math.random() * 54);
            activeRoundData = { segment: wheelSegments[resultIdx], bets: activeBets };
            
            let sliceDeg = 360 / 54;
            
            // 【修正點】：額外扣除半個區塊的角度 (sliceDeg / 2)，讓區塊正中心對齊 12 點鐘指針
            let targetAngle = 360 - (resultIdx * sliceDeg) - (sliceDeg / 2); 
            
            // 隨機偏移停靠點 (範圍稍微縮小，確保指針不會太靠近邊緣產生視覺誤會)
            let randomOffset = (Math.random() * (sliceDeg * 0.6)) - (sliceDeg * 0.3); 
            
            let spins = 5 * 360; 
            let extraDeg = (targetAngle + randomOffset) - (currentRotation % 360);
            if (extraDeg < 0) extraDeg += 360;
            currentRotation += spins + extraDeg;

            canvas.style.transform = `rotate(${currentRotation}deg)`;
            setTimeout(resolveVisualSpin, 5200);
        }

        function resolveVisualSpin() {
            let res = activeRoundData.segment;
            let suffix = res.bonus ? getText('msgBonusSuffix') : '';
            logMessage(formatText('msgWheelStop', typeNames[res.type], suffix));
            activeRoundData.bets.forEach(bet => stats.bets[bet]++);

            if (activeRoundData.bets.includes(res.type)) {
                if (res.type === 4) { triggerMysteryBox(); return; } 
                else {
                    let win = res.bonus ? (res.bonus + 1) : baseReturns[res.type];
                    stats.wins[res.type] += win;
                    logMessage(formatText('msgWin', win), 'highlight-win');
                }
            } else { logMessage(getText('msgLose')); }

            updateStatsTable();
            setButtonsDisabled(false);
        }

        function triggerMysteryBox() {
            logMessage(getText('msgBoxTrigger'), 'highlight-bonus');
            activeRoundData.boxChoices = shuffle([ weightedChoice(boxA.vals, boxA.probs), weightedChoice(boxB.vals, boxB.probs), weightedChoice(boxC.vals, boxC.probs) ]);
            const container = document.getElementById("boxesContainer"); container.innerHTML = '';
            document.getElementById("modalCloseBtn").style.display = "none";
            activeRoundData.boxChoices.forEach((val, index) => {
                let box = document.createElement('div'); box.className = 'mystery-box'; box.innerText = "?";
                box.onclick = () => openVisualBox(box, index, val); container.appendChild(box);
            });
            document.getElementById("mysteryModal").style.display = "flex";
        }
        function openVisualBox(boxElem, index, val) {
            if (document.getElementById("modalCloseBtn").style.display === "block") return;
            
            document.querySelectorAll('.mystery-box').forEach((box, idx) => {
                box.classList.add('opened'); 
                
                // 【修改點 1】：寶箱畫面上顯示不含本金的淨倍率 (-1)
                let displayMultiplier = activeRoundData.boxChoices[idx] - 1;
                box.innerText = displayMultiplier + "x";
                
                if (idx === index) box.classList.add('winner');
            });
            
            // 實際結算依然使用 val (含本金的數值) 加入統計
            stats.wins[4] += val; 
            updateStatsTable();
            
            // 【修改點 2】：遊戲日誌中也顯示不含本金的淨倍率 (-1)
            let selectedDisplayMultiplier = val - 1;
            logMessage(formatText('msgBoxResult', selectedDisplayMultiplier), 'highlight-win');
            
            document.getElementById("modalCloseBtn").style.display = "block";
        }
        function closeMysteryModal() { document.getElementById("mysteryModal").style.display = "none"; setButtonsDisabled(false); }

        function runBulkSimulation(rounds) {
            let activeBets = getActiveBets(); if (activeBets.length === 0) { alert(getText('alertSelect')); return; }
            setButtonsDisabled(true); 
            logMessage(formatText('msgSimStart', rounds.toLocaleString()));
            
            setTimeout(() => {
                for (let i = 0; i < rounds; i++) {
                    let numBonuses = currentModel.getBonusCount();
                    let bonusTargets = shuffle(regularIndices).slice(0, numBonuses);
                    let resultIdx = Math.floor(Math.random() * 54);
                    let resultType = wheelSegments[resultIdx].type;
                    activeBets.forEach(betType => {
                        stats.bets[betType]++; let winAmount = 0;
                        if (betType === resultType) {
                            if (betType !== 4) {
                                winAmount = bonusTargets.includes(resultIdx) ? weightedChoice(pools[betType].vals, pools[betType].probs) + 1 : baseReturns[betType];
                            } else {
                                let choices = [ weightedChoice(boxA.vals, boxA.probs), weightedChoice(boxB.vals, boxB.probs), weightedChoice(boxC.vals, boxC.probs) ];
                                winAmount = choices[Math.floor(Math.random() * 3)];
                            }
                        }
                        stats.wins[betType] += winAmount;
                    });
                }
                logMessage(getText('msgSimDone'), 'highlight-win'); 
                updateStatsTable(); setButtonsDisabled(false);
            }, 50);
        }

        // 初始化語系
        applyLanguage();
    </script>
</body>
